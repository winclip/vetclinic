services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vetclinic}
      POSTGRES_USER: ${POSTGRES_USER:-vetclinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vetclinic}
    volumes:
      - vetclinic_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vetclinic} -d ${POSTGRES_DB:-vetclinic}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/vetclinic}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-vetclinic}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-vetclinic}
      VETCLINIC_JWT_SECRET: ${VETCLINIC_JWT_SECRET:-dev-only-change-me-min-32-chars!!}
      VETCLINIC_BOOTSTRAP_ENABLED: ${VETCLINIC_BOOTSTRAP_ENABLED:-true}
      VETCLINIC_BOOTSTRAP_ADMIN_USERNAME: ${VETCLINIC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      VETCLINIC_BOOTSTRAP_ADMIN_PASSWORD: ${VETCLINIC_BOOTSTRAP_ADMIN_PASSWORD:-local-dev}
    depends_on:
      db:
        condition: service_healthy

volumes:
  vetclinic_pgdata:

