spring:
  application:
    name: vetclinic
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

springdoc:
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

vetclinic:
  jwt:
    secret: ${VETCLINIC_JWT_SECRET:dev-only-change-me-min-32-chars!!}
    expiration: ${VETCLINIC_JWT_EXPIRATION:PT1H}
  clinic-timezone: ${VETCLINIC_CLINIC_TIMEZONE:UTC}
