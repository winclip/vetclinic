spring:
  application:
    name: vetclinic
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

vetclinic:
  jwt:
    # HS256: минимум 32 байта. В проде задайте VETCLINIC_JWT_SECRET.
    secret: ${VETCLINIC_JWT_SECRET:dev-only-change-me-min-32-chars!!}
    expiration: ${VETCLINIC_JWT_EXPIRATION:PT1H}
